<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="僑界名片簿">
<meta name="theme-color" content="#2a1f14">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/favicon.svg">
<title>僑界名片簿</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','DM Sans',sans-serif;background:linear-gradient(180deg,#faf8f5,#f3efe8);min-height:100vh;-webkit-font-smoothing:antialiased}
input,textarea,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.pw-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2a1f14 0%,#4a3520 40%,#6b4c28 100%);padding:20px}
.pw-box{background:#fff;border-radius:20px;padding:40px 30px;width:100%;max-width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.pw-box h1{font-family:'Noto Serif TC',serif;font-size:28px;color:#2a1f14;letter-spacing:3px;margin-bottom:6px}
.pw-box p{color:#9a8a6a;font-size:13px;margin-bottom:24px}
.pw-input{width:100%;padding:14px 16px;border:2px solid #e0dcd4;border-radius:12px;font-size:16px;outline:none;text-align:center;letter-spacing:2px;transition:border-color 0.2s}
.pw-input:focus{border-color:#8B6914}
.pw-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#5a3e28,#8B6914);color:#fff;font-weight:700;font-size:16px;cursor:pointer;margin-top:14px;box-shadow:0 3px 12px rgba(139,105,20,0.3)}
.pw-error{color:#dc2626;font-size:13px;margin-top:10px}
.header{background:linear-gradient(135deg,#2a1f14 0%,#4a3520 40%,#6b4c28 100%);padding:28px 20px 22px;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;top:-30px;right:-30px;width:150px;height:150px;border-radius:50%;background:rgba(139,105,20,0.15)}
.header h1{font-family:'Noto Serif TC',serif;font-size:24px;color:#f5e6c8;letter-spacing:2px;position:relative;z-index:1}
.header p{color:rgba(245,230,200,0.6);font-size:13px;letter-spacing:1px;margin-top:4px;position:relative;z-index:1}
.container{max-width:600px;margin:0 auto;padding:0 16px 100px}
.tip{margin:14px 0 4px;padding:10px 14px;border-radius:10px;background:#f0ede5;border:1px solid #e0dcc8;display:flex;align-items:center;gap:10px;font-size:12px;color:#6b5c3e}
.actions{display:flex;gap:10px;margin:12px 0 18px}
.btn-primary{flex:1;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#5a3e28,#8B6914);color:#fff;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 3px 12px rgba(139,105,20,0.3)}
.btn-outline{flex:1;padding:14px;border-radius:12px;border:2px solid #8B6914;background:rgba(139,105,20,0.06);color:#6b4c28;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.toolbar button{flex:1;min-width:100px;padding:11px 12px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.search-row{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.search-input{flex:1;padding:11px 12px 11px 36px;border-radius:10px;border:1.5px solid #e0dcd4;font-size:14px;outline:none;background:#fff;width:100%}
.search-input:focus{border-color:#8B6914}
.card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid rgba(0,0,0,0.05);box-shadow:0 1px 4px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);margin-bottom:10px;transition:all 0.2s}
.card.selected{border:2px solid #8B6914}
.card-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#5a3e28,#8B6914);display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:600;font-family:'Noto Serif TC',serif;flex-shrink:0}
.checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.checkbox.checked{border:none;background:linear-gradient(135deg,#5a3e28,#8B6914)}
.card-detail{padding:0 16px 14px 92px;font-size:13px;color:#4a4a4a;line-height:1.7;border-top:1px solid #f0ece4;padding-top:12px}
.card-detail .label{color:#8B6914;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:1px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:18px;width:100%;max-width:480px;max-height:85vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid #f0ece4}
.modal-body{padding:18px 22px}
.field label{font-size:12px;font-weight:600;color:#8B6914;margin-bottom:3px;display:block}
.field input,.field textarea{width:100%;padding:10px 12px;border:1.5px solid #e0dcd4;border-radius:8px;font-size:14px;outline:none;background:#fdfcfa}
.field input:focus,.field textarea:focus{border-color:#8B6914}
.loading{padding:16px 18px;border-radius:12px;background:#fff;border:1.5px solid #e8dfc8;margin-bottom:14px;display:flex;align-items:center;gap:12px;animation:fadeIn 0.3s}
.spinner{width:20px;height:20px;border:3px solid #e0d5c0;border-top-color:#8B6914;border-radius:50%;animation:spin 0.8s linear infinite}
.error-box{padding:14px 16px;border-radius:12px;background:#fff5f5;border:1.5px solid #fecaca;margin-bottom:14px;font-size:13px;color:#b91c1c}
.empty{text-align:center;padding:50px 20px;color:#b0a080;font-size:14px;line-height:1.8}
.settings-btn{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#5a3e28,#8B6914);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;z-index:100}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const DEFAULT_PASSWORD="hakka2026";
function store(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function load(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch(e){return def}}
function compressImage(file,maxDim=1800,quality=0.7){return new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>maxDim||h>maxDim){if(w>h){h=Math.round(h*maxDim/w);w=maxDim}else{w=Math.round(w*maxDim/h);h=maxDim}}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);resolve(c.toDataURL("image/jpeg",quality).split(",")[1])};img.onerror=()=>reject(new Error("圖片載入失敗"));const r=new FileReader();r.onload=e=>{img.src=e.target.result};r.onerror=()=>reject(new Error("檔案讀取失敗"));r.readAsDataURL(file)})}
async function extractFromImage(b64,apiKey){if(!apiKey)throw new Error("請先在設定中輸入 Anthropic API Key");const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:3000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:`You are a business card scanner. This photo may contain ONE or MULTIPLE business cards.\n1. Identify each DISTINCT business card.\n2. For each card, extract contact info.\n3. If front and back are both visible, merge into ONE contact.\n4. If a card lists multiple people, create one entry per person.\nFor each person return: name, chineseName, titles, org, phone, email, address, business, note (empty string if not found).\nReturn ONLY a valid JSON array. No markdown.`}]}]})});if(!resp.ok)throw new Error(`API 錯誤 (${resp.status})`);const data=await resp.json();const text=data.content?.map(c=>c.text||"").join("")||"[]";const clean=text.replace(/\`\`\`json|\`\`\`/g,"").trim();try{return JSON.parse(clean)}catch(e){const m=clean.match(/\[[\s\S]*\]/);if(m)return JSON.parse(m[0]);throw new Error("無法解析回應")}}
function norm(s){return(s||"").toLowerCase().replace(/\s+/g,"").replace(/[()（）\-_.,]/g,"")}
function findDups(nc,list){const matches=[];for(const ex of list){let s=0,r=[];if(nc.name&&ex.name&&norm(nc.name)===norm(ex.name)){s+=3;r.push("英文名相同")}if(nc.chineseName&&ex.chineseName&&norm(nc.chineseName)===norm(ex.chineseName)){s+=3;r.push("中文名相同")}if(nc.email&&ex.email&&norm(nc.email)===norm(ex.email)){s+=5;r.push("Email 相同")}const np=(nc.phone||"").replace(/\D/g,"").slice(-7),ep=(ex.phone||"").replace(/\D/g,"").slice(-7);if(np.length>=7&&ep.length>=7&&np===ep){s+=4;r.push("電話相同")}if(s>=3)matches.push({existing:ex,score:s,reason:r.join("、")})}return matches.sort((a,b)=>b.score-a.score)}
function mergeC(ex,inc){const m={...ex};for(const f of["name","chineseName","titles","org","phone","email","address","business","note"]){const ev=(ex[f]||"").trim(),iv=(inc[f]||"").trim();if(!ev&&iv)m[f]=iv;else if(ev&&iv&&ev!==iv){if(["titles","org","note","address","phone"].includes(f)){const lines=new Set(ev.split("\n").map(l=>l.trim()).filter(Boolean));iv.split("\n").map(l=>l.trim()).filter(Boolean).forEach(nl=>{if(!lines.has(nl))lines.add(nl)});m[f]=[...lines].join("\n")}else if(iv.length>ev.length)m[f]=iv}}return m}
function exportCSV(contacts,group="僑界名片"){const h=["Name","Given Name","Additional Name","Family Name","Group Membership","E-mail 1 - Type","E-mail 1 - Value","Phone 1 - Type","Phone 1 - Value","Organization 1 - Name","Organization 1 - Title","Notes"];const rows=contacts.filter(c=>c.email).map(c=>{const d=`${c.name}${c.chineseName?` (${c.chineseName})`:""}`,p=c.name.split(" ");return[d,p[0]||"",c.chineseName||"",p.slice(1).join(" ")||"",`${group} ::: * myContacts`,"Other",c.email,"Mobile",c.phone,c.org?.split("\n")[0]||"",c.titles?.split("\n")[0]||"",(c.note||"").replace(/\n/g,"; ")].map(v=>`"${(v||"").replace(/"/g,'""')}"`)});const csv="\uFEFF"+[h.join(","),...rows.map(r=>r.join(","))].join("\n");const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));a.download=`${group}_Google匯入_${new Date().toISOString().slice(0,10)}.csv`;a.click()}

function PasswordScreen({onUnlock}){const[pw,setPw]=useState("");const[err,setErr]=useState("");const savedPw=load("app-password",DEFAULT_PASSWORD);const handle=()=>{if(pw===savedPw){sessionStorage.setItem("unlocked","1");onUnlock()}else{setErr("密碼錯誤，請重試")}};return(<div className="pw-screen"><div className="pw-box" style={{animation:"slideUp 0.4s ease"}}><div style={{fontSize:50,marginBottom:12}}>📇</div><h1>僑界名片簿</h1><p>請輸入密碼</p><input className="pw-input" type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("")}} onKeyDown={e=>{if(e.key==="Enter")handle()}} placeholder="密碼" autoFocus/><button className="pw-btn" onClick={handle}>進入</button>{err&&<div className="pw-error">{err}</div>}</div></div>)}

function SettingsModal({onClose}){const[apiKey,setApiKey]=useState(load("anthropic-key",""));const[pw,setPw]=useState(load("app-password",DEFAULT_PASSWORD));const[saved,setSaved]=useState(false);const save=()=>{store("anthropic-key",apiKey);store("app-password",pw);setSaved(true);setTimeout(()=>setSaved(false),2000)};return(<div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-header"><h3 style={{fontSize:17,fontWeight:700}}>設定</h3><button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#999",fontSize:20}}>x</button></div><div className="modal-body" style={{display:"flex",flexDirection:"column",gap:16}}><div className="field"><label>App 密碼</label><input type="text" value={pw} onChange={e=>setPw(e.target.value)} placeholder="設定密碼"/><div style={{fontSize:11,color:"#999",marginTop:4}}>下次開啟 App 時需要輸入</div></div><div className="field"><label>Anthropic API Key（AI 名片辨識用）</label><input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..."/><div style={{fontSize:11,color:"#999",marginTop:4}}>到 <a href="https://console.anthropic.com/settings/keys" target="_blank" style={{color:"#1a73e8"}}>console.anthropic.com</a> 取得。Key 只存在你的手機上。沒有 Key 也可以手動新增聯絡人。</div></div><div style={{display:"flex",gap:10}}><button onClick={onClose} style={{flex:1,padding:"12px",borderRadius:10,border:"1.5px solid #d0c9bc",background:"#fff",color:"#6b5c3e",fontWeight:600,fontSize:14,cursor:"pointer"}}>取消</button><button onClick={save} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:saved?"#16a34a":"linear-gradient(135deg,#5a3e28,#8B6914)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>{saved?"已儲存 ✓":"儲存設定"}</button></div><div style={{borderTop:"1px solid #f0ece4",paddingTop:14,marginTop:4}}><button onClick={()=>{sessionStorage.removeItem("unlocked");location.reload()}} style={{width:"100%",padding:"10px",borderRadius:10,border:"1.5px solid #fecaca",background:"#fff5f5",color:"#dc2626",fontWeight:600,fontSize:13,cursor:"pointer"}}>登出</button></div></div></div></div>)}

function EditModal({contact,onSave,onClose}){const[form,setForm]=useState({...contact});const fields=[{k:"name",l:"英文姓名"},{k:"chineseName",l:"中文姓名"},{k:"titles",l:"頭銜",m:1},{k:"org",l:"組織",m:1},{k:"phone",l:"電話"},{k:"email",l:"Email"},{k:"address",l:"地址/網站",m:1},{k:"business",l:"其他生意"},{k:"note",l:"備註",m:1}];return(<div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-header"><h3 style={{fontSize:17,fontWeight:700}}>{contact.id?"編輯":"新增"}聯絡人</h3><button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#999",fontSize:20}}>x</button></div><div className="modal-body" style={{display:"flex",flexDirection:"column",gap:12}}>{fields.map(f=><div key={f.k} className="field">{f.m?<><label>{f.l}</label><textarea rows={3} value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})}/></>:<><label>{f.l}</label><input value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})}/></>}</div>)}</div><div style={{padding:"14px 22px 20px",display:"flex",gap:10,justifyContent:"flex-end"}}><button onClick={onClose} style={{padding:"10px 22px",borderRadius:10,border:"1.5px solid #d0c9bc",background:"#fff",color:"#6b5c3e",fontWeight:600,cursor:"pointer"}}>取消</button><button onClick={()=>onSave(form)} style={{padding:"10px 28px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#5a3e28,#8B6914)",color:"#fff",fontWeight:700,cursor:"pointer"}}>儲存</button></div></div></div>)}

function MergeModal({dups,onMerge,onKeep,onClose}){return(<div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:500}}><div className="modal-header"><h3 style={{fontSize:17,fontWeight:700}}>偵測到可能重複</h3><button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#999",fontSize:20}}>x</button></div><div style={{padding:"16px 22px"}}>{dups.map((d,i)=>(<div key={i} style={{marginBottom:16,background:"#faf8f5",borderRadius:12,border:"1px solid #e8dfc8",overflow:"hidden"}}><div style={{padding:"10px 16px",background:"#f5f0e5",borderBottom:"1px solid #e8dfc8",fontSize:13,fontWeight:600,color:"#e65100"}}>符合：{d.match.reason}</div><div style={{display:"flex"}}><div style={{flex:1,padding:"12px 14px",borderRight:"1px solid #e8dfc8"}}><div style={{fontSize:10,fontWeight:700,color:"#999",marginBottom:4}}>已存在</div><div style={{fontWeight:700,fontSize:14}}>{d.match.existing.name||d.match.existing.chineseName}</div></div><div style={{flex:1,padding:"12px 14px"}}><div style={{fontSize:10,fontWeight:700,color:"#e65100",marginBottom:4}}>新掃描</div><div style={{fontWeight:700,fontSize:14}}>{d.incoming.name||d.incoming.chineseName}</div></div></div><div style={{padding:"10px 14px",display:"flex",gap:8,borderTop:"1px solid #e8dfc8"}}><button onClick={()=>onMerge(d)} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#e65100,#ff8f00)",color:"#fff",fontWeight:700,cursor:"pointer"}}>合併</button><button onClick={()=>onKeep(d)} style={{flex:1,padding:"10px",borderRadius:10,border:"1.5px solid #d0c9bc",background:"#fff",color:"#6b5c3e",fontWeight:600,cursor:"pointer"}}>分開存</button></div></div>))}</div></div></div>)}

function App(){const[unlocked,setUnlocked]=useState(sessionStorage.getItem("unlocked")==="1");const[contacts,setContacts]=useState(load("hakka-contacts",[]));const[search,setSearch]=useState("");const[loading,setLoading]=useState(false);const[loadText,setLoadText]=useState("");const[error,setError]=useState("");const[editC,setEditC]=useState(null);const[showSettings,setShowSettings]=useState(false);const[selected,setSelected]=useState(new Set());const[pendingDups,setPendingDups]=useState(null);const[expanded,setExpanded]=useState(new Set());const fileRef=useRef(null);const camRef=useRef(null);
useEffect(()=>{store("hakka-contacts",contacts)},[contacts]);
const processImage=useCallback(async(file)=>{setLoading(true);setError("");setLoadText("壓縮圖片中...");try{const b64=await compressImage(file);setLoadText("AI 辨識名片中...");const apiKey=load("anthropic-key","");const extracted=await extractFromImage(b64,apiKey);const now=new Date().toISOString().slice(0,10);const nc=extracted.map(c=>({name:"",chineseName:"",titles:"",org:"",phone:"",email:"",address:"",business:"",note:"",...c,id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),createdAt:now}));const dups=[],noDups=[];for(const n of nc){const m=findDups(n,contacts);if(m.length>0)dups.push({incoming:n,match:m[0]});else noDups.push(n)}if(noDups.length>0)setContacts(p=>[...noDups,...p]);if(dups.length>0){setPendingDups(dups);setLoadText(`辨識 ${nc.length} 位，${dups.length} 位可能重複`)}else setLoadText(`已辨識 ${nc.length} 位聯絡人！`);setTimeout(()=>setLoading(false),1000)}catch(err){console.error(err);setLoading(false);setError(err.message)}},[contacts]);
const handleFile=useCallback(e=>{Array.from(e.target.files||[]).forEach(f=>processImage(f));e.target.value=""},[processImage]);
const handleSave=useCallback(form=>{if(form.id)setContacts(p=>p.map(c=>c.id===form.id?form:c));else setContacts(p=>[{...form,id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),createdAt:new Date().toISOString().slice(0,10)},...p]);setEditC(null)},[]);
const handleMerge=useCallback(d=>{setContacts(p=>p.map(c=>c.id===d.match.existing.id?mergeC(d.match.existing,d.incoming):c));setPendingDups(p=>{const r=p.filter(x=>x!==d);return r.length?r:null})},[]);
const handleKeep=useCallback(d=>{setContacts(p=>[d.incoming,...p]);setPendingDups(p=>{const r=p.filter(x=>x!==d);return r.length?r:null})},[]);
const toggleExp=useCallback(id=>setExpanded(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s}),[]);
const toggleSel=useCallback(id=>setSelected(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s}),[]);
const filtered=contacts.filter(c=>{if(!search)return true;return[c.name,c.chineseName,c.titles,c.org,c.phone,c.email,c.business,c.note].join(" ").toLowerCase().includes(search.toLowerCase())});
const selContacts=selected.size>0?contacts.filter(c=>selected.has(c.id)):contacts;
const emails=[...new Set(selContacts.filter(c=>c.email).map(c=>c.email))];
if(!unlocked)return <PasswordScreen onUnlock={()=>setUnlocked(true)}/>;
return(<div><div className="header"><h1>僑界名片簿</h1><p>多張辨識 · 智慧合併 · 群組寄信</p></div><div className="container"><div className="tip"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="14" height="10" rx="2"/><rect x="8" y="3" width="14" height="10" rx="2"/></svg><span>多張名片排在一起拍一張照，AI 自動分開辨識</span></div><div className="actions"><input ref={camRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}}/><input ref={fileRef} type="file" accept="image/*" multiple onChange={handleFile} style={{display:"none"}}/><button className="btn-primary" onClick={()=>camRef.current?.click()}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> 拍名片</button><button className="btn-outline" onClick={()=>fileRef.current?.click()}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> 上傳圖片</button></div>
{loading&&<div className="loading"><div className="spinner"></div><span style={{color:"#5a4a2a",fontWeight:500}}>{loadText}</span></div>}
{error&&<div className="error-box">{error}<br/><button onClick={()=>setError("")} style={{marginTop:6,fontSize:12,color:"#999",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>關閉</button></div>}
{contacts.length>0&&(<div className="toolbar"><button onClick={()=>exportCSV(contacts)} style={{border:"1.5px solid #1a73e8",background:"rgba(26,115,232,0.06)",color:"#1a73e8"}}><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Google CSV</button><button onClick={()=>{if(emails.length>0)window.location.href=`mailto:?bcc=${emails.join(",")}`}} style={{border:`1.5px solid ${emails.length?"#e65100":"#ddd"}`,background:emails.length?"rgba(230,81,0,0.06)":"#f9f9f9",color:emails.length?"#e65100":"#bbb",cursor:emails.length?"pointer":"default"}}><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>{selected.size>0?`寄 ${selected.size} 人`:"群組寄信"}</button></div>)}
<div className="search-row"><div style={{flex:1,position:"relative"}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b0a080" strokeWidth="2" strokeLinecap="round" style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input className="search-input" placeholder="搜尋姓名、組織、頭銜..." value={search} onChange={e=>setSearch(e.target.value)}/></div><button onClick={()=>setEditC({id:"",name:"",chineseName:"",titles:"",org:"",phone:"",email:"",address:"",business:"",note:""})} style={{width:42,height:42,borderRadius:10,border:"1.5px solid #e0dcd4",background:"#fff",color:"#8B6914",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,paddingLeft:2}}><span style={{fontSize:12,color:"#9a8a6a"}}>共 {contacts.length} 位{search&&`，找到 ${filtered.length} 位`}{selected.size>0&&<span style={{color:"#8B6914",fontWeight:600}}> · 已選 {selected.size}</span>}</span><div style={{display:"flex",gap:8}}>{selected.size>0&&<button onClick={()=>setSelected(new Set())} style={{fontSize:12,color:"#999",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>取消</button>}{contacts.length>0&&<button onClick={()=>setSelected(new Set(filtered.map(c=>c.id)))} style={{fontSize:12,color:"#8B6914",background:"none",border:"none",cursor:"pointer",fontWeight:600}}>全選</button>}</div></div>
{filtered.length===0&&<div className="empty">{contacts.length===0?<><div style={{fontSize:40,marginBottom:12}}>📇</div><div style={{fontWeight:600}}>還沒有名片</div><div>拍照或上傳名片，AI 自動辨識</div></>:"沒有符合的聯絡人"}</div>}
{filtered.map(c=>(<div key={c.id} className={`card${selected.has(c.id)?" selected":""}`}><div className="card-header"><div className={`checkbox${selected.has(c.id)?" checked":""}`} onClick={()=>toggleSel(c.id)}>{selected.has(c.id)&&<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}</div><div className="avatar" onClick={()=>toggleExp(c.id)}>{(c.chineseName||c.name||"?").slice(0,1)}</div><div style={{flex:1,minWidth:0}} onClick={()=>toggleExp(c.id)}><div style={{fontWeight:700,fontSize:15,color:"#1a1a1a"}}>{c.name||c.chineseName} {c.name&&c.chineseName&&<span style={{color:"#6b5c3e",fontWeight:500}}>{c.chineseName}</span>}</div><div style={{fontSize:12,color:"#7a7060",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.org||c.titles||"\u2014"}</div>{c.email&&<div style={{fontSize:11,color:"#999",marginTop:1}}>{c.email}</div>}</div><button onClick={()=>setEditC(c)} style={{background:"none",border:"none",color:"#9a8a6a",cursor:"pointer",padding:4}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button onClick={()=>{if(confirm("確定要刪除？"))setContacts(p=>p.filter(x=>x.id!==c.id))}} style={{background:"none",border:"none",color:"#c0a080",cursor:"pointer",padding:4}}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div>{expanded.has(c.id)&&(<div className="card-detail">{[{k:"titles",l:"頭銜"},{k:"org",l:"組織"},{k:"phone",l:"電話"},{k:"email",l:"Email"},{k:"address",l:"地址/網站"},{k:"business",l:"其他生意"},{k:"note",l:"備註"}].map(f=>c[f.k]?<div key={f.k} style={{marginBottom:7}}><span className="label">{f.l}</span><div style={{whiteSpace:"pre-line",marginTop:1}}>{c[f.k]}</div></div>:null)}</div>)}</div>))}
</div><button className="settings-btn" onClick={()=>setShowSettings(true)}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>{editC&&<EditModal contact={editC} onSave={handleSave} onClose={()=>setEditC(null)}/>}{showSettings&&<SettingsModal onClose={()=>setShowSettings(false)}/>}{pendingDups&&<MergeModal dups={pendingDups} onMerge={handleMerge} onKeep={handleKeep} onClose={()=>setPendingDups(null)}/>}</div>)}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
