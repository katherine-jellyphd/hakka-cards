const TEXT_FIELDS=["name","chineseName","titles","org","phone","email","line","facebook","instagram","address","business","qrcode","note"];
const MULTILINE_FIELDS=["titles","org","phone","address","note","qrcode","line"];
function dedupLines(s){if(!s)return s;const lines=[];s.split("\n").map(l=>l.trim()).filter(Boolean).forEach(l=>{if(lines.some(ex=>ex===l||ex.includes(l)))return;const idx=lines.findIndex(ex=>l.includes(ex));if(idx>=0)lines[idx]=l;else lines.push(l)});return lines.join("\n")}

if(!Array.isArray(s.extras))s.extras=[];const migrate={"line":"line","facebook":"facebook","fb":"facebook","instagram":"instagram","ig":"instagram"};s.extras.forEach(e=>{if(!e||!e.label)return;const k=String(e.label).trim().toLowerCase();const field=migrate[k];if(field&&!s[field])s[field]=String(e.value).trim()});s.extras=s.extras.filter(e=>e&&e.label&&e.value&&!migrate[String(e.label).trim().toLowerCase()]);const seen=new Set();s.extras=s.extras.map(e=>({label:String(e.label).trim(),value:String(e.value).trim()})).filter(e=>{const k=e.label+":"+e.value;if(seen.has(k))return false;seen.add(k);return true});

function findDups(nc,list){const matches=[];for(const ex of list){let s=0,r=[];if(nc.name&&ex.name&&norm(nc.name)===norm(ex.name)){s+=3;r.push("英文名相同")}if(nc.chineseName&&ex.chineseName&&norm(nc.chineseName)===norm(ex.chineseName)){s+=3;r.push("中文名相同")}if(nc.email&&ex.email){const ne=new Set((nc.email||"").split("\n").map(l=>norm(l)).filter(Boolean));const ee=(ex.email||"").split("\n").map(l=>norm(l)).filter(Boolean);if(ee.some(e=>ne.has(e))){s+=5;r.push("Email 相同")}}const nps=(nc.phone||"").split("\n").map(p=>p.replace(/\D/g,"").slice(-7)).filter(p=>p.length>=7);const eps=(ex.phone||"").split("\n").map(p=>p.replace(/\D/g,"").slice(-7)).filter(p=>p.length>=7);if(nps.some(p=>eps.includes(p))){s+=4;r.push("電話相同")}if(s>=3)matches.push({existing:ex,score:s,reason:r.join("、")})}return matches.sort((a,b)=>b.score-a.score)}

function PasswordScreen({onUnlock}){const[pw,setPw]=useState("");const[err,setErr]=useState("");const savedPw=load("app-password",DEFAULT_PASSWORD);const handle=()=>{if(pw===savedPw){sessionStorage.setItem("unlocked","1");onUnlock()}else{setErr("密碼錯誤，請重試")}};return(<div className="pw-screen"><div className="pw-box" style={{animation:"slideUp 0.4s ease"}}><div style={{fontSize:50,marginBottom:12}}>📇</div><h1>僑界名片簿</h1><p>請輸入密碼</p><input className="pw-input" type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("")}} onKeyDown={e=>{if(e.key==="Enter")handle()}} placeholder="密碼" autoFocus/><button className="pw-btn" onClick={handle}>進入</button>{err&&<div className="pw-error">{err}</div>}</div></div>)}

function EditModal({contact,onSave,onClose}){const[form,setForm]=useState({...contact});const avatarRef=useRef(null);const handleAvatar=e=>{const file=e.target.files?.[0];if(!file)return;const img=new Image();img.onload=()=>{const s=Math.min(img.width,img.height);const sx=(img.width-s)/2,sy=(img.height-s)/2;const c=document.createElement("canvas");c.width=120;c.height=120;c.getContext("2d").drawImage(img,sx,sy,s,s,0,0,120,120);setForm(f=>({...f,thumbnail:c.toDataURL("image/jpeg",0.6)}))};const r=new FileReader();r.onload=ev=>{img.src=ev.target.result};r.readAsDataURL(file);e.target.value=""};const fields=[{k:"chineseName",l:"中文姓名"},{k:"name",l:"英文姓名"},{k:"titles",l:"頭銜",m:1},{k:"org",l:"組織",m:1},{k:"phone",l:"電話",m:1},{k:"email",l:"Email"},{k:"line",l:"LINE ID"},{k:"facebook",l:"Facebook"},{k:"instagram",l:"Instagram"},{k:"address",l:"地址/網站",m:1},{k:"business",l:"其他生意"},{k:"qrcode",l:"QR Code 網址",m:1},{k:"note",l:"備註",m:1}];return(<div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-header"><h3 style={{fontSize:17,fontWeight:700}}>{contact.id?"編輯":"新增"}聯絡人</h3><button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#999",fontSize:20}}>x</button></div><div className="modal-body" style={{display:"flex",flexDirection:"column",gap:12}}><div style={{display:"flex",alignItems:"center",gap:14}}><input ref={avatarRef} type="file" accept="image/*" onChange={handleAvatar} style={{display:"none"}}/><div onClick={()=>avatarRef.current?.click()} style={{cursor:"pointer",position:"relative"}}>{form.thumbnail?<img src={form.thumbnail} style={{width:56,height:56,borderRadius:"50%",objectFit:"cover"}}/>:<div className="avatar" style={{width:56,height:56,fontSize:22}}>{(form.chineseName||form.name||"?").slice(0,1)}</div>}<div style={{position:"absolute",bottom:-2,right:-2,width:20,height:20,borderRadius:"50%",background:"#2E3D64",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div></div><div style={{fontSize:12,color:"#8a96ab"}}>點擊更換頭像</div>{form.thumbnail&&<button onClick={()=>setForm(f=>({...f,thumbnail:null}))} style={{fontSize:11,color:"#CD9B9B",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>移除</button>}</div>{fields.map(f=><div key={f.k} className="field">{f.m?<><label>{f.l}</label><textarea rows={3} value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})}/></>:<><label>{f.l}</label><input value={form[f.k]||""} onChange={e=>setForm({...form,[f.k]:e.target.value})}/></>}</div>)}<div style={{borderTop:"1px solid #edf1f5",paddingTop:10,marginTop:4}}><div style={{fontSize:12,fontWeight:600,color:"#2E3D64",marginBottom:8}}>其他資訊</div>{(form.extras||[]).map((ex,i)=><div key={i} style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}><input value={ex.label} onChange={e=>{const extras=[...(form.extras||[])];extras[i]={...extras[i],label:e.target.value};setForm({...form,extras})}} placeholder="標籤" style={{width:80,padding:"7px 8px",border:"1.5px solid #CFDDE6",borderRadius:6,fontSize:13,outline:"none"}}/><input value={ex.value} onChange={e=>{const extras=[...(form.extras||[])];extras[i]={...extras[i],value:e.target.value};setForm({...form,extras})}} placeholder="內容" style={{flex:1,padding:"7px 8px",border:"1.5px solid #CFDDE6",borderRadius:6,fontSize:13,outline:"none"}}/><button onClick={()=>{const extras=(form.extras||[]).filter((_,j)=>j!==i);setForm({...form,extras})}} style={{background:"none",border:"none",color:"#CD9B9B",cursor:"pointer",fontSize:16,padding:"0 4px"}}>x</button></div>)}<button onClick={()=>setForm({...form,extras:[...(form.extras||[]),{label:"",value:""}]})} style={{fontSize:12,color:"#2E3D64",background:"none",border:"1.5px dashed #CFDDE6",borderRadius:8,padding:"6px 12px",cursor:"pointer",width:"100%"}}>+ 新增欄位</button></div></div><div style={{padding:"14px 22px 20px",display:"flex",gap:10,justifyContent:"flex-end"}}><button onClick={onClose} style={{padding:"10px 22px",borderRadius:10,border:"1.5px solid #CFDDE6",background:"#fff",color:"#2E3D64",fontWeight:600,cursor:"pointer"}}>取消</button><button onClick={()=>onSave(form)} style={{padding:"10px 28px",borderRadius:10,border:"none",background:"#2E3D64",color:"#fff",fontWeight:700,cursor:"pointer"}}>儲存</button></div></div></div>)}

function MergeModal({dups,onMerge,onKeep,onClose}){return(<div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:500}}><div className="modal-header"><h3 style={{fontSize:17,fontWeight:700}}>偵測到可能重複</h3><button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#999",fontSize:20}}>x</button></div><div style={{padding:"16px 22px"}}>{dups.map((d,i)=>(<div key={i} style={{marginBottom:16,background:"#F4F6F9",borderRadius:12,border:"1px solid #CFDDE6",overflow:"hidden"}}><div style={{padding:"10px 16px",background:"#e8edf3",borderBottom:"1px solid #CFDDE6",fontSize:13,fontWeight:600,color:"#CD9B9B"}}>符合：{d.match.reason}</div><div style={{display:"flex"}}><div style={{flex:1,padding:"12px 14px",borderRight:"1px solid #CFDDE6"}}><div style={{fontSize:10,fontWeight:700,color:"#999",marginBottom:4}}>已存在</div><div style={{fontWeight:700,fontSize:14}}>{d.match.existing.name||d.match.existing.chineseName}</div></div><div style={{flex:1,padding:"12px 14px"}}><div style={{fontSize:10,fontWeight:700,color:"#CD9B9B",marginBottom:4}}>新掃描</div><div style={{fontWeight:700,fontSize:14}}>{d.incoming.name||d.incoming.chineseName}</div></div></div><div style={{padding:"10px 14px",display:"flex",gap:8,borderTop:"1px solid #CFDDE6"}}><button onClick={()=>onMerge(d)} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"#2E3D64",color:"#F4F6F9",fontWeight:700,cursor:"pointer"}}>合併</button><button onClick={()=>onKeep(d)} style={{flex:1,padding:"10px",borderRadius:10,border:"1.5px solid #CFDDE6",background:"#fff",color:"#2E3D64",fontWeight:600,cursor:"pointer"}}>分開存</button></div></div>))}</div></div></div>)}

function autoDedupList(list){const clean=[];for(const c of list){const m=findDups(c,clean);if(m.length>0){const idx=clean.indexOf(m[0].existing);clean[idx]=mergeC(clean[idx],c)}else clean.push(c)}return clean}
function App(){const[unlocked,setUnlocked]=useState(sessionStorage.getItem("unlocked")==="1");const[contacts,setContacts]=useState([]);const[dbReady,setDbReady]=useState(false);const[search,setSearch]=useState("");const[loading,setLoading]=useState(false);const[loadText,setLoadText]=useState("");const[error,setError]=useState("");const[editC,setEditC]=useState(null);const[showSettings,setShowSettings]=useState(false);const[selected,setSelected]=useState(new Set());const[pendingDups,setPendingDups]=useState(null);const[expanded,setExpanded]=useState(new Set());const fileRef=useRef(null);const camRef=useRef(null);
useEffect(()=>{(async()=>{let rows=await dbLoad();if(rows.length===0&&!localStorage.getItem("migrated-to-db")){const local=load("hakka-contacts",[]).map(sanitize);if(local.length>0){rows=autoDedupList(local);await dbUpsertMany(rows)}localStorage.setItem("migrated-to-db","1")}rows=rows.map(sanitize);const deduped=autoDedupList(rows);if(deduped.length<rows.length){const dedupIds=new Set(deduped.map(c=>c.id));const removeIds=rows.filter(c=>!dedupIds.has(c.id)).map(c=>c.id);if(removeIds.length)await dbDeleteMany(removeIds);await dbUpsertMany(deduped)}setContacts(deduped);setDbReady(true)})()},[])
const processImage=useCallback(async(file)=>{setLoading(true);setError("");setLoadText("壓縮圖片中...");try{const b64=await compressImage(file);setLoadText("AI 辨識名片中...");const extracted=await extractFromImage(b64);const now=new Date().toISOString().slice(0,10);const nc=[];for(const raw of extracted){let thumbnail=null;if(raw.faceX!=null){thumbnail=await cropRegion(b64,raw)}nc.push(sanitize({name:"",chineseName:"",titles:"",org:"",phone:"",email:"",line:"",facebook:"",instagram:"",address:"",business:"",qrcode:"",note:"",...raw,thumbnail,id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),createdAt:now}))}const dups=[],noDups=[];for(const n of nc){const mEx=findDups(n,contacts);const mNew=findDups(n,noDups);if(mEx.length>0)dups.push({incoming:n,match:mEx[0]});else if(mNew.length>0){const idx=noDups.indexOf(mNew[0].existing);noDups[idx]=mergeC(noDups[idx],n)}else noDups.push(n)}if(noDups.length>0){await dbUpsertMany(noDups);setContacts(p=>[...noDups,...p])}if(dups.length>0){setPendingDups(dups);setLoadText(`辨識 ${nc.length} 位，${dups.length} 位可能重複`)}else setLoadText(`已辨識 ${nc.length} 位聯絡人！`);setTimeout(()=>setLoading(false),1000)}catch(err){console.error(err);setLoading(false);setError(err.message)}},[contacts]);
const handleFile=useCallback(async e=>{const files=Array.from(e.target.files||[]);e.target.value="";for(const f of files){await processImage(f)}},[processImage]);
const handleSave=useCallback(async form=>{const saved=sanitize(form.id?form:{...form,id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),createdAt:new Date().toISOString().slice(0,10)});await dbUpsert(saved);if(form.id)setContacts(p=>p.map(c=>c.id===form.id?saved:c));else setContacts(p=>[saved,...p]);setEditC(null)},[]);
const handleMerge=useCallback(async d=>{const merged=mergeC(d.match.existing,d.incoming);await dbUpsert(merged);setContacts(p=>p.map(c=>c.id===d.match.existing.id?merged:c));setPendingDups(p=>{const r=p.filter(x=>x!==d);return r.length?r:null})},[]);
const handleKeep=useCallback(async d=>{await dbUpsert(d.incoming);setContacts(p=>[d.incoming,...p]);setPendingDups(p=>{const r=p.filter(x=>x!==d);return r.length?r:null})},[]);
const toggleExp=useCallback(id=>setExpanded(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s}),[]);
const toggleSel=useCallback(id=>setSelected(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s}),[]);
const filtered=contacts.filter(c=>{if(!search)return true;return[c.name,c.chineseName,c.titles,c.org,c.phone,c.email,c.line,c.facebook,c.instagram,c.business,c.qrcode,c.note,...(c.extras||[]).map(e=>e.label+" "+e.value)].join(" ").toLowerCase().includes(search.toLowerCase())});
const selContacts=selected.size>0?contacts.filter(c=>selected.has(c.id)):contacts;
const emails=[...new Set(selContacts.filter(c=>c.email).flatMap(c=>c.email.split("\n").map(e=>e.trim()).filter(Boolean)))];
if(!unlocked)return <PasswordScreen onUnlock={()=>setUnlocked(true)}/>;
return(<div><div className="header"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",position:"relative",zIndex:1}}><h1>僑界名片簿</h1><button onClick={()=>{location.href=location.pathname+'?t='+Date.now()}} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:10,padding:"10px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#F4F6F9",fontWeight:500}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F4F6F9" strokeWidth="2.5" strokeLinecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>重整</button></div><p>多張辨識 · 智慧合併 · 群組寄信</p></div><div className="container"><div className="tip"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="14" height="10" rx="2"/><rect x="8" y="3" width="14" height="10" rx="2"/></svg><span>多張名片排在一起拍一張照，AI 自動分開辨識</span></div><div className="actions"><input ref={camRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}}/><input ref={fileRef} type="file" accept="image/*" multiple onChange={handleFile} style={{display:"none"}}/><button className="btn-primary" disabled={loading} style={loading?{opacity:0.5}:{}} onClick={()=>camRef.current?.click()}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> 拍名片</button><button className="btn-outline" disabled={loading} style={loading?{opacity:0.5}:{}} onClick={()=>fileRef.current?.click()}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> 上傳圖片</button></div>
{loading&&<div className="loading"><div className="spinner"></div><span style={{color:"#2E3D64",fontWeight:500}}>{loadText}</span></div>}
{error&&<div className="error-box">{error}<br/><button onClick={()=>setError("")} style={{marginTop:6,fontSize:12,color:"#999",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>關閉</button></div>}
{contacts.length>0&&(<div className="toolbar">{selected.size>=2&&<button onClick={async()=>{const sel=contacts.filter(c=>selected.has(c.id));if(sel.length<2)return;let merged=sel[0];for(let i=1;i<sel.length;i++)merged=mergeC(merged,sel[i]);const removeIds=sel.slice(1).map(c=>c.id);await dbDeleteMany(removeIds);await dbUpsert(merged);setContacts(p=>[merged,...p.filter(c=>!removeIds.includes(c.id)&&c.id!==merged.id)]);setSelected(new Set())}} style={{border:"1.5px solid #CD9B9B",background:"rgba(205,155,155,0.08)",color:"#CD9B9B"}}><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M16 16v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4"/><rect x="10" y="2" width="12" height="12" rx="2"/></svg> 合併 {selected.size} 人</button>}<button onClick={()=>exportCSV(contacts)} style={{border:"1.5px solid #2E3D64",background:"rgba(46,61,100,0.06)",color:"#2E3D64"}}><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Google CSV</button><button onClick={()=>{if(emails.length>0)window.location.href=`mailto:?bcc=${emails.join(",")}`}} style={{border:`1.5px solid ${emails.length?"#CD9B9B":"#ddd"}`,background:emails.length?"rgba(205,155,155,0.08)":"#f9f9f9",color:emails.length?"#CD9B9B":"#bbb",cursor:emails.length?"pointer":"default"}}><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>{selected.size>0?`寄 ${selected.size} 人`:"群組寄信"}</button></div>)}
<div className="search-row"><div style={{flex:1,position:"relative"}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a96ab" strokeWidth="2" strokeLinecap="round" style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input className="search-input" placeholder="搜尋姓名、組織、頭銜..." value={search} onChange={e=>setSearch(e.target.value)}/></div><button onClick={()=>setEditC({id:"",name:"",chineseName:"",titles:"",org:"",phone:"",email:"",line:"",facebook:"",instagram:"",address:"",business:"",qrcode:"",note:"",extras:[]})} style={{width:42,height:42,borderRadius:10,border:"1.5px solid #CFDDE6",background:"#fff",color:"#2E3D64",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,paddingLeft:2}}><span style={{fontSize:12,color:"#8a96ab"}}>共 {contacts.length} 位{search&&`，找到 ${filtered.length} 位`}{selected.size>0&&<span style={{color:"#CD9B9B",fontWeight:600}}> · 已選 {selected.size}</span>}</span><div style={{display:"flex",gap:8}}>{selected.size>0&&<button onClick={()=>setSelected(new Set())} style={{fontSize:12,color:"#999",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>取消</button>}{contacts.length>0&&<button onClick={()=>setSelected(new Set(filtered.map(c=>c.id)))} style={{fontSize:12,color:"#2E3D64",background:"none",border:"none",cursor:"pointer",fontWeight:600}}>全選</button>}</div></div>
{filtered.length===0&&<div className="empty">{contacts.length===0?<><div style={{fontSize:40,marginBottom:12}}>📇</div><div style={{fontWeight:600}}>還沒有名片</div><div>拍照或上傳名片，AI 自動辨識</div></>:"沒有符合的聯絡人"}</div>}
{filtered.map(c=>(<div key={c.id} className={`card${selected.has(c.id)?" selected":""}`}><div className="card-header"><div className={`checkbox${selected.has(c.id)?" checked":""}`} onClick={()=>toggleSel(c.id)}>{selected.has(c.id)&&<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}</div>{c.thumbnail?<img src={c.thumbnail} onClick={()=>toggleExp(c.id)} style={{width:42,height:42,borderRadius:"50%",objectFit:"cover",cursor:"pointer",flexShrink:0}}/>:<div className="avatar" onClick={()=>toggleExp(c.id)}>{(c.chineseName||c.name||"?").slice(0,1)}</div>}<div style={{flex:1,minWidth:0}} onClick={()=>toggleExp(c.id)}><div style={{fontWeight:700,fontSize:15,color:"#1a1a1a"}}>{c.chineseName||c.name} {c.name&&c.chineseName&&<span style={{color:"#5a6b80",fontWeight:500}}>{c.name}</span>}</div><div style={{fontSize:12,color:"#6b7a8d",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.org||c.titles||"\u2014"}</div>{c.email&&<div style={{fontSize:11,color:"#999",marginTop:1}}>{c.email}</div>}</div><button onClick={()=>setEditC(c)} style={{background:"none",border:"none",color:"#8a96ab",cursor:"pointer",padding:4}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button onClick={()=>{if(confirm("確定要刪除？")){dbDelete(c.id);setContacts(p=>p.filter(x=>x.id!==c.id))}}} style={{background:"none",border:"none",color:"#a0b0c0",cursor:"pointer",padding:4}}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div>{expanded.has(c.id)&&(<div className="card-detail">{[{k:"titles",l:"頭銜"},{k:"org",l:"組織"},{k:"phone",l:"電話"},{k:"email",l:"Email"},{k:"line",l:"LINE"},{k:"facebook",l:"Facebook"},{k:"instagram",l:"Instagram"},{k:"address",l:"地址/網站"},{k:"business",l:"其他生意"},{k:"qrcode",l:"QR Code"},{k:"note",l:"備註"}].map(f=>c[f.k]?<div key={f.k} style={{marginBottom:7}}><span className="label">{f.l}</span><div style={{whiteSpace:"pre-line",marginTop:1}}>{c[f.k]}</div></div>:null)}{(c.extras||[]).map((e,i)=><div key={"x"+i} style={{marginBottom:7}}><span className="label">{e.label}</span><div style={{whiteSpace:"pre-line",marginTop:1}}>{e.value}</div></div>)}</div>)}</div>))}
</div><button className="settings-btn" onClick={()=>setShowSettings(true)}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>{editC&&<EditModal contact={editC} onSave={handleSave} onClose={()=>setEditC(null)}/>}{showSettings&&<SettingsModal onClose={()=>setShowSettings(false)}/>}{pendingDups&&<MergeModal dups={pendingDups} onMerge={handleMerge} onKeep={handleKeep} onClose={()=>setPendingDups(null)}/>}</div>)}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
